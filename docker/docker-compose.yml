version: "3.9"

services:

  postgres:

    image: pgvector/pgvector:pg16

    container_name: financial_pgvector

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: financialdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: